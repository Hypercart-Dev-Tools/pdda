# PDDA sync manifest — the ONE declaration of what HQ distributes to registered target repos.
#
# Read by BOTH install.sh (initial copy on register/upgrade) and pdda-sync.sh (steady-state push), via
# the shared expander in pdda-manifest.sh. Do NOT hardcode this file set anywhere else — one canonical
# place per fact (GUIDING-PRINCIPLES #4).
#
# Syntax — one directive per line; blank lines and lines starting with # are ignored:
#   dir     <repo-relpath>   recursively include every git-tracked file under this directory
#   file    <repo-relpath>   include a single file
#   exclude <glob>           drop matching repo-relpaths from the expanded set (applied LAST)
#
# Paths are repo-relative to the HQ root. Expansion prefers `git ls-files` so untracked junk
# (node_modules, editor temp files, …) never ships. New files/folders added under a `dir` root
# propagate automatically on the next push — no edit to this file required.

dir     utils/pdda
file    PROJECT/PDDA.md

# HQ-only tooling — registered targets are leaf nodes that never run the sync engine themselves, so the
# sync machinery is excluded from the set pushed to them.
exclude utils/pdda/pdda-sync.sh
exclude utils/pdda/pdda-manifest.sh
exclude utils/pdda/pdda-sync-manifest.conf
